name: Generar y Publicar Javadoc

on:
  push:
    branches:
      - stable  # Solo se ejecuta cuando subes cambios a stable

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generar Javadoc
        run: |
          mkdir -p docs
          javadoc -d docs -sourcepath src/main/java -subpackages com.tt1.test

      - name: Commit de los cambios en stable
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: actualizar javadoc en stable" && git push origin stable)

      - name: Subir a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs  # Carpeta donde se generó el HTML
