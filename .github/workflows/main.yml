name: CI - Test y Sincronización a Early

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar Tests con Maven
        run: mvn test

      - name: Actualizar rama early si los tests pasan
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Cambiamos a la rama early (la crea si no existe)
          git checkout -B early
          # Fusionamos los cambios de main en early
          git merge main
          # Subimos los cambios al repositorio original
          git push origin early
